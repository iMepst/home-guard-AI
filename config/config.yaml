camera:
  rtsp_url: "rtsp://${CAMERA_USER}:${CAMERA_PASSWORD}@${CAMERA_IP}/h264Preview_01_sub"

mqtt:
  broker: "${MQTT_BROKER_IP}"
  port: 1883
  topic_prefix: "homeai"
  username: "${MQTT_USER}"
  password: "${MQTT_PASSWORD}"

model:
  path: "models/yolov8n.pt"
  classes: [0, 16, 26, 39, 63, 70]
  confidence_threshold: 0.7
  device: "mps"

stream:
  reconnect_delay: 5
  max_reconnect_attempts: 10

gesture:
  model_path: "models/gesture_recognizer.task"
  min_confidence: 0.7
  throttle_seconds: 2
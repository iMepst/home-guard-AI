camera:
  rtsp_url: "rtsp://${CAMERA_USER}:${CAMERA_PASSWORD}@${CAMERA_IP}/h264Preview_01_sub"

mqtt:
  broker: "${MQTT_BROKER_IP}"
  port: 1883
  topic_prefix: "homeai"
  username: "${MQTT_USER}"
  password: "${MQTT_PASSWORD}"

model:
  path: "models/yolov8n.pt"
  confidence_threshold: 0.5
  device: "mps"

stream:
  reconnect_delay: 5
  max_reconnect_attempts: 10